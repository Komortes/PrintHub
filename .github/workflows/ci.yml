name: ci

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PrintHub.sln

      - name: Build
        run: dotnet build PrintHub.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PrintHub.sln --configuration Release --no-build --maxcpucount:1 --nodeReuse:false
